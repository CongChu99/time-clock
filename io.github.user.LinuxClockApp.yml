app-id: io.github.user.LinuxClockApp
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: linux-clock-app

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-config/linux-clock-app:create

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - '*.la'
  - '*.a'

modules:
  - name: linux-clock-app
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
    sources:
      - type: dir
        path: .
