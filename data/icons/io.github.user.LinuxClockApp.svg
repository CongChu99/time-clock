<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock circle background -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#2c3e50" stroke-width="2"/>

  <!-- Hour markers -->
  <circle cx="24" cy="4" r="1.5" fill="#2c3e50"/>
  <circle cx="44" cy="24" r="1.5" fill="#2c3e50"/>
  <circle cx="24" cy="44" r="1.5" fill="#2c3e50"/>
  <circle cx="4" cy="24" r="1.5" fill="#2c3e50"/>

  <!-- Hour hand (pointing to 10) -->
  <line x1="24" y1="24" x2="20" y2="12" stroke="#2c3e50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 2) -->
  <line x1="24" y1="24" x2="34" y2="16" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="#2c3e50"/>
</svg>
